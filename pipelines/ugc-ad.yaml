name: ugc-ad
description: >-
  Default UGC ad pipeline — Director → Editor → Reviewer with an optional
  human approval gate after the Director and a retry loop that sends
  Reviewer feedback back to the Director when the overall score falls
  below the threshold. Consumed by src.pipeline.runner.run_pipeline.
steps:
  - agent: director
    gate: human_approval
  - agent: trim_refiner
  - agent: editor
  - agent: reviewer
    retry_if:
      metric: overall
      operator: "<"
      threshold: 0.65
      max_retries: 2
      feedback_target: director
